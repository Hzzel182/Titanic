<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget TMDB - Titanic</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .tmdb-widget {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }
        .tmdb-poster {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }
        .tmdb-content {
            padding: 20px;
        }
        .tmdb-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #38bdf8;
        }
        .tmdb-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .tmdb-overview {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="tmdb-widget" id="movieWidget">
        <div style="padding: 20px; text-align: center;">Cargando widget...</div>
    </div>

    <script>
        const API_KEY = '0ba50b1a0e817c1f5e8ba94951a3a3c2'; 
        const MOVIE_ID = 597; // ID oficial de Titanic en TMDB
        const URL = `https://api.themoviedb.org/3/movie/${MOVIE_ID}?language=es-MX&api_key=${API_KEY}`;

        fetch(URL)
            .then(response => response.json())
            .then(data => {
                const widget = document.getElementById('movieWidget');
                const posterUrl = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                
                widget.innerHTML = `
                    <img class="tmdb-poster" src="${posterUrl}" alt="${data.title}">
                    <div class="tmdb-content">
                        <h2 class="tmdb-title">${data.title}</h2>
                        <div class="tmdb-info">
                            <span>📅 ${data.release_date.split('-')[0]}</span>
                            <span>⭐ ${data.vote_average.toFixed(1)} / 10</span>
                        </div>
                        <p class="tmdb-overview">${data.overview}</p>
                    </div>
                `;
            })
            .catch(error => {
                console.error('Error al conectar con la API:', error);
                document.getElementById('movieWidget').innerHTML = '<p style="padding:20px; color: #ef4444; text-align:center;">Error al cargar los datos. Verifica tu conexión o clave de API.</p>';
            });
    </script>
</body>
</html>
