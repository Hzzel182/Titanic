<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget TMDB - Reparto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Escribe una película..." value="">
        <button onclick="buscarPelicula()">Buscar</button>
    </div>

    <div class="tmdb-widget" id="movieWidget">
        <div class="loading">Escribe una película arriba para ver su reparto.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
