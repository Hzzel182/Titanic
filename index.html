<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget TMDB - Completo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            outline: none;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background-color: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0ea5e9;
        }
        .tmdb-widget {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }
        .tmdb-poster {
            width: 100%;
            height: 420px;
            object-fit: cover;
        }
        .tmdb-content {
            padding: 20px;
        }
        .tmdb-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #38bdf8;
        }
        .tmdb-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .genre-tag {
            background-color: #334155;
            color: #38bdf8;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .tmdb-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
            border-top: 1px solid #334155;
            border-bottom: 1px solid #334155;
            padding: 8px 0;
        }
        .tmdb-overview {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Escribe otra película..." value="Titanic">
        <button onclick="buscarPelicula()">Buscar</button>
    </div>

    <div class="tmdb-widget" id="movieWidget">
        <div style="padding: 20px; text-align: center;">Cargando widget...</div>
    </div>

    <script>
        const API_KEY = '0ba50b1a0e817c1f5e8ba94951a3a3c2'; 

        function cargarDetalles(movieId) {
            const detailUrl = `https://api.themoviedb.org/3/movie/${movieId}?language=es-MX&api_key=${API_KEY}`;

            fetch(detailUrl)
                .then(response => response.json())
                .then(movie => {
                    const widget = document.getElementById('movieWidget');
                    const posterUrl = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Sin+Imagen';
                    const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/D';
                    const genresHtml = movie.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join('');
                    const hours = Math.floor(movie.runtime / 60);
                    const minutes = movie.runtime % 60;
                    const runtimeStr = movie.runtime ? `${hours}h ${minutes}m` : 'N/D';
                    
                    widget.innerHTML = `
                        <img class="tmdb-poster" src="${posterUrl}" alt="${movie.title}">
                        <div class="tmdb-content">
                            <h2 class="tmdb-title">${movie.title}</h2>
                            <div class="tmdb-genres">${genresHtml}</div>
                            <div class="tmdb-info">
                                <span>📅 ${releaseYear}</span>
                                <span>⏱️ ${runtimeStr}</span>
                                <span>⭐ ${movie.vote_average.toFixed(1)}</span>
                            </div>
                            <p class="tmdb-overview">${movie.overview || 'Sin descripción disponible.'}</p>
                        </div>
                    `;
                })
                .catch(error => {
                    console.error('Error al cargar detalles:', error);
                });
        }

        function buscarPelicula() {
            const query = document.getElementById('searchInput').value;
            if (query.trim() !== '') {
                const searchUrl = `https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(query)}&language=es-MX&api_key=${API_KEY}`;

                fetch(searchUrl)
                    .then(response => response.json())
                    .then(data => {
                        const widget = document.getElementById('movieWidget');
                        if (data.results && data.results.length > 0) {
                            // Tomamos el ID del primer resultado y pedimos sus datos completos
                            cargarDetalles(data.results[0].id);
                        } else {
                            widget.innerHTML = '<p style="padding:20px; color: #f59e0b; text-align:center;">No se encontró ninguna película.</p>';
                        }
                    })
                    .catch(error => {
                        console.error('Error en la búsqueda:', error);
                    });
            }
        }

        // Carga inicial con Titanic (ID: 597)
        cargarDetalles(597);
    </script>
</body>
</html>
